name: silent_zone
description: Smart GPS-based Silent Zone Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Location & GPS
  geolocator: ^12.0.0

  # Maps (no API key needed - uses OpenStreetMap)
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Storage & State
  shared_preferences: ^2.3.0
  provider: ^6.1.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true